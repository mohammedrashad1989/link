<html lang="ar" dir="rtl">

<title>محافظات المدينة المنورة</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Cairo', Tahoma, Arial, sans-serif;
    background: #0c1a2e;
    color: #e8d5b0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: linear-gradient(135deg, #0c1a2e 0%, #1a2d4a 100%);
    border-bottom: 1px solid rgba(196,164,88,0.25);
    flex-shrink: 0;
  }

  .header-title {
    display: flex;
    flex-direction: column;
  }

  .header-title h1 {
    font-size: 1.35rem;
    font-weight: 700;
    color: #c4a458;
    letter-spacing: 0.01em;
  }

  .header-title p {
    font-size: 0.72rem;
    color: #8fa5c0;
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  .header-badge {
    font-size: 0.68rem;
    color: #8fa5c0;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(196,164,88,0.18);
    border-radius: 4px;
    padding: 4px 10px;
    text-align: center;
  }

  .map-wrapper {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: default;
  }

  /* Tooltip */
  #tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(10,20,38,0.96);
    border: 1px solid rgba(196,164,88,0.5);
    border-radius: 8px;
    padding: 12px 16px;
    min-width: 200px;
    max-width: 260px;
    display: none;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  #tooltip .tt-name {
    font-size: 1rem;
    font-weight: 700;
    color: #c4a458;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(196,164,88,0.2);
    padding-bottom: 7px;
  }

  #tooltip .tt-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.76rem;
    margin-top: 5px;
    gap: 12px;
  }

  #tooltip .tt-label { color: #8fa5c0; }
  #tooltip .tt-value { color: #e8d5b0; font-weight: 600; }

  #tooltip .tt-hint {
    font-size: 0.68rem;
    color: #5a7090;
    margin-top: 10px;
    text-align: center;
    font-style: italic;
  }

  /* Legend */
  #legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(10,20,38,0.9);
    border: 1px solid rgba(196,164,88,0.25);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.7rem;
    color: #8fa5c0;
    min-width: 140px;
  }

  #legend .leg-title {
    font-size: 0.72rem;
    color: #c4a458;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .leg-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
  }

  .leg-swatch {
    width: 16px;
    height: 12px;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }

  /* Zoom controls */
  #zoom-controls {
    position: absolute;
    top: 16px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .zoom-btn {
    width: 32px;
    height: 32px;
    background: rgba(10,20,38,0.9);
    border: 1px solid rgba(196,164,88,0.3);
    border-radius: 6px;
    color: #c4a458;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .zoom-btn:hover { background: rgba(196,164,88,0.12); }

  /* Active info panel */
  #info-panel {
    position: absolute;
    top: 16px;
    right: 20px;
    background: rgba(10,20,38,0.92);
    border: 1px solid rgba(196,164,88,0.35);
    border-radius: 8px;
    padding: 14px 16px;
    width: 210px;
    display: none;
    font-size: 0.74rem;
  }

  #info-panel h3 {
    color: #c4a458;
    font-size: 0.88rem;
    margin-bottom: 9px;
    border-bottom: 1px solid rgba(196,164,88,0.2);
    padding-bottom: 6px;
  }

  .ip-row {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    gap: 8px;
  }

  .ip-label { color: #8fa5c0; }
  .ip-value { color: #e8d5b0; font-weight: 600; }

  .ip-note {
    margin-top: 10px;
    font-size: 0.67rem;
    color: #5a7090;
    text-align: center;
  }
</style>

// Color palette — 9 distinct desert/geo tones
const PALETTE = [
  '#c4723a','#5a8fa3','#8db87a','#b88a3f','#7a6ea8',
  '#3e8f78','#d4855a','#6a9abd','#a06060'
];

const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');

let transform = { scale: 1, offsetX: 0, offsetY: 0 };
let hoveredIdx = -1;
let baseTransform = null;

// ---- Projection helpers ----
function project(lng, lat, t) {
  const x = (lng - t.minLng) / (t.maxLng - t.minLng) * t.drawW + t.padX;
  const y = (1 - (lat - t.minLat) / (t.maxLat - t.minLat)) * t.drawH + t.padY;
  return [x, y];
}

function computeBaseTransform(W, H) {
  const pad = 40;
  let minLng=Infinity, maxLng=-Infinity, minLat=Infinity, maxLat=-Infinity;
  for (const f of GEOJSON.features) {
    for (const [lng, lat] of f.geometry.coordinates[0]) {
      if (lng < minLng) minLng=lng; if (lng > maxLng) maxLng=lng;
      if (lat < minLat) minLat=lat; if (lat > maxLat) maxLat=lat;
    }
  }
  const drawW = W - pad*2, drawH = H - pad*2;
  // maintain aspect ratio
  const scaleX = drawW / (maxLng - minLng);
  const scaleY = drawH / (maxLat - minLat);
  const s = Math.min(scaleX, scaleY);
  const actualW = (maxLng - minLng) * s;
  const actualH = (maxLat - minLat) * s;
  const padX = (W - actualW) / 2;
  const padY = (H - actualH) / 2;
  return { minLng, maxLng, minLat, maxLat, drawW: actualW, drawH: actualH, padX, padY, W, H };
}

// ---- Canvas path for a polygon feature ----
function buildPath(feature, bt) {
  const coords = feature.geometry.coordinates[0];
  ctx.beginPath();
  for (let i = 0; i < coords.length; i++) {
    // apply zoom transform
    let [x, y] = project(coords[i][0], coords[i][1], bt);
    x = x * transform.scale + transform.offsetX;
    y = y * transform.scale + transform.offsetY;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
}

// ---- Color by normalized density ----
function getDensityColor(feature, idx, hovered) {
  const base = PALETTE[idx % PALETTE.length];
  const alpha = hovered ? 1.0 : 0.78;
  // parse hex and apply alpha via globalAlpha approach — just return lighter if hovered
  return base;
}

// ---- Legend population ----
function buildLegend() {
  const leg = document.getElementById('legend');
  let html = '<div class="leg-title">المحافظات</div>';
  GEOJSON.features.forEach((f, i) => {
    html += `<div class="leg-item">
      <div class="leg-swatch" style="background:${PALETTE[i % PALETTE.length]}"></div>
      <span>${f.properties.name}</span>
    </div>`;
  });
  leg.innerHTML = html;
}

// ---- Draw ----
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#0c1a2e');
  bg.addColorStop(1, '#101e30');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  if (!baseTransform) return;
  const bt = baseTransform;

  GEOJSON.features.forEach((f, i) => {
    const hovered = i === hoveredIdx;
    buildPath(f, bt);
    ctx.globalAlpha = hovered ? 1.0 : 0.82;
    ctx.fillStyle = PALETTE[i % PALETTE.length];
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = hovered ? '#f5e0a0' : 'rgba(230,210,160,0.4)';
    ctx.lineWidth = hovered ? 2 : 0.8;
    ctx.stroke();

    // Label
    const center = getPolygonCenter(f.geometry.coordinates[0], bt);
    if (center) {
      ctx.globalAlpha = hovered ? 1 : 0.85;
      ctx.fillStyle = hovered ? '#ffffff' : '#f0e8d0';
      ctx.font = hovered ? 'bold 11px Segoe UI, Cairo, Arial' : '10px Segoe UI, Cairo, Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      // short name
      const shortName = f.properties.name.replace('محافظة ', '').replace(' ومراكزها', '');
      ctx.fillText(shortName, center[0], center[1]);
      ctx.globalAlpha = 1;
    }
  });
}

function getPolygonCenter(coords, bt) {
  let cx=0, cy=0, n=coords.length;
  for (const [lng,lat] of coords) {
    let [x,y] = project(lng, lat, bt);
    x = x * transform.scale + transform.offsetX;
    y = y * transform.scale + transform.offsetY;
    cx+=x; cy+=y;
  }
  return [cx/n, cy/n];
}

// ---- Hit test ----
function hitTest(mx, my) {
  if (!baseTransform) return -1;
  const bt = baseTransform;
  for (let i = GEOJSON.features.length-1; i >= 0; i--) {
    buildPath(GEOJSON.features[i], bt);
    if (ctx.isPointInPath(mx, my)) return i;
  }
  return -1;
}

// ---- Resize ----
function resize() {
  const wrapper = canvas.parentElement;
  canvas.width = wrapper.clientWidth;
  canvas.height = wrapper.clientHeight;
  baseTransform = computeBaseTransform(canvas.width, canvas.height);
  draw();
}

// ---- Tooltip ----
const tooltip = document.getElementById('tooltip');
function showTooltip(f, mx, my) {
  document.getElementById('tt-name').textContent = f.properties.name;
  document.getElementById('tt-pop').textContent = f.properties.population.toLocaleString('ar-SA');
  document.getElementById('tt-area').textContent = (f.properties.area / 1e6).toFixed(0).toLocaleString('ar-SA') + ' كم²';
  document.getElementById('tt-den').textContent = (f.properties.population / (f.properties.area / 1e6)).toFixed(2) + ' نسمة/كم²';
  tooltip.style.display = 'block';
  posTooltip(mx, my);
}

function posTooltip(mx, my) {
  const tw = tooltip.offsetWidth || 220, th = tooltip.offsetHeight || 130;
  const cw = canvas.width, ch = canvas.height;
  let tx = mx + 16, ty = my - 20;
  if (tx + tw > cw - 10) tx = mx - tw - 12;
  if (ty + th > ch - 10) ty = ch - th - 10;
  if (ty < 10) ty = 10;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

// ---- Mouse events ----
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  const idx = hitTest(mx, my);
  if (idx !== hoveredIdx) {
    hoveredIdx = idx;
    draw();
  }
  if (idx >= 0) {
    canvas.style.cursor = 'pointer';
    showTooltip(GEOJSON.features[idx], mx, my);
  } else {
    canvas.style.cursor = 'default';
    hideTooltip();
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredIdx = -1;
  hideTooltip();
  draw();
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  const idx = hitTest(mx, my);
  if (idx < 0) return;
  const f = GEOJSON.features[idx];
  const coords = f.geometry.coordinates[0];
  let lat=0, lng=0;
  for (const [lo,la] of coords) { lng+=lo; lat+=la; }
  lat/=coords.length; lng/=coords.length;
  const url = `https://www.google.com/maps/search/${encodeURIComponent(f.properties.name)}/@${lat.toFixed(4)},${lng.toFixed(4)},10z`;
  window.open(url, '_blank');

  // show info panel
  const panel = document.getElementById('info-panel');
  document.getElementById('ip-name').textContent = f.properties.name;
  document.getElementById('ip-pop').textContent = f.properties.population.toLocaleString('ar-SA');
  document.getElementById('ip-area').textContent = (f.properties.area/1e6).toFixed(0).toLocaleString('ar-SA') + ' كم²';
  document.getElementById('ip-den').textContent = (f.properties.population/(f.properties.area/1e6)).toFixed(2)+' نسمة/كم²';
  document.getElementById('ip-code').textContent = (idx+1).toString().padStart(2,'0');
  panel.style.display = 'block';
  setTimeout(() => { panel.style.display = 'none'; }, 4000);
});

// ---- Zoom & pan ----
document.getElementById('zoomIn').addEventListener('click', () => zoomAt(1.3));
document.getElementById('zoomOut').addEventListener('click', () => zoomAt(1/1.3));
document.getElementById('zoomReset').addEventListener('click', () => {
  transform = { scale: 1, offsetX: 0, offsetY: 0 };
  draw();
});

function zoomAt(factor) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  transform.offsetX = cx - factor * (cx - transform.offsetX);
  transform.offsetY = cy - factor * (cy - transform.offsetY);
  transform.scale *= factor;
  draw();
}

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
  transform.offsetX = mx - factor * (mx - transform.offsetX);
  transform.offsetY = my - factor * (my - transform.offsetY);
  transform.scale *= factor;
  draw();
}, { passive: false });

// drag
let drag = null;
canvas.addEventListener('mousedown', e => {
  drag = { x: e.clientX, y: e.clientY, ox: transform.offsetX, oy: transform.offsetY };
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
    transform.offsetX = drag.ox + dx;
    transform.offsetY = drag.oy + dy;
    draw();
  }
});
window.addEventListener('mouseup', () => { drag = null; });

// ---- Init ----
buildLegend();
resize();
window.addEventListener('resize', resize);
</script>
</body>
